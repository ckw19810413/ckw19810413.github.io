mainSections = ['post']
rssFullContent = true
favicon = 'favicon.ico'
dateFormat = { published = '2006-01-02', lastUpdated = '2006-01-02' }

[sidebar]
  subtitle = '記錄並分享日常'

[widgets]
  homepage = [
      { type = 'search' },
      { type = 'archives', params = { limit = 5 } },
      { type = 'categories', params = { limit = 10 } },
      { type = 'tag-cloud', params = { limit = 10 } },
  ]
  page = [{ type = 'toc' }]

[comment]
  enabled = false

[colorScheme]
  toggle = true
  default = 'auto'

[imageProcessing]
  content = { enabled = true }
  thumbnail = { enabled = true }